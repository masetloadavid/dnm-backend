<!DOCTYPE html>
<html>
<head>
  <title>DNM Backend Tester</title>
</head>
<body>

<h1>Doktor Near Me API Tester</h1>

<!-- CREATE AFFILIATE -->
<h3>Create Affiliate</h3>
<button onclick="createAffiliate()">Create Affiliate</button>

<!-- CREATE BOOKING -->
<h3>Create Booking</h3>
<button onclick="createBooking()">Create Booking</button>

<!-- CREATE REFERRAL -->
<h3>Create Referral</h3>
<button onclick="createReferral()">Create Referral</button>

<pre id="output"></pre>

<script>
const BASE_URL = "https://dnm-backend-production-218c.up.railway.app";

function show(data) {
  document.getElementById("output").innerText =
    JSON.stringify(data, null, 2);
}

// 1️⃣ Create Affiliate
async function createAffiliate() {
  const res = await fetch(BASE_URL + "/api/affiliates", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: 1,
      referral_code: "AFF" + Math.floor(Math.random() * 1000),
      total_earnings: 0
    })
  });

  show(await res.json());
}

// 2️⃣ Create Booking
async function createBooking() {
  const res = await fetch(BASE_URL + "/api/bookings", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: 1,
      practitioner_id: 1,
      appointment_date: "2026-04-20 10:00:00",
      status: "pending"
    })
  });

  show(await res.json());
}

// 3️⃣ Create Referral
async function createReferral() {
  const res = await fetch(BASE_URL + "/api/referrals", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      affiliate_id: 1,
      user_id: 1,
      booking_id: 1,
      commission: 25,
      status: "pending"
    })
  });

  show(await res.json());
}
</script>

</body>
</html>
