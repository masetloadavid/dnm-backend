<!DOCTYPE html>
<html>
<head>
  <title>Affiliate Register</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      max-width: 500px;
      margin: auto;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }
    button {
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    pre {
      background: #020617;
      padding: 15px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Affiliate Registration</h1>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <input id="phone" placeholder="Phone (optional)" />

    <button onclick="registerAffiliate()">Register</button>

    <pre id="output"></pre>
  </div>

  <script>
    const BASE_URL = "https://dnm-backend-production-218c.up.railway.app";

    async function registerAffiliate() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const phone = document.getElementById("phone").value;

      const res = await fetch(BASE_URL + "/api/affiliate/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password, phone })
      });

      const data = await res.json();
      document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
