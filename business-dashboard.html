<!DOCTYPE html>
<html>
<head>
  <title>Business Owner Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Divine Sleep">
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
  <style>
    body {
      visibility: hidden;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 18px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .box {
      background: #020617;
      padding: 18px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: bold;
      transition: 0.25s ease;
      overflow: hidden;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .box strong {
    display: block;
    font-size: 32px;
    margin-top: 10px;
    color: #38bdf8;
}
    .box span {
  display: block;
  font-size: 15px;
  line-height: 1.2;
}

.box:hover {
    transform: scale(1.03);
    box-shadow: 0 0 16px rgba(56,189,248,0.25);
}

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}

.quick-actions button:hover {
  box-shadow: 0 0 18px rgba(56,189,248,0.45);
}
    
button {
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:active {
  transform: scale(0.97);
}
    
    .quick-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.quick-actions button {
  width: 100%;
  box-shadow: 0 4px 12px rgba(56, 189, 248, 0.25);
  font-size: 16px;
  padding: 14px;
}

    pre {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    .lead-card {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .app-layout {
  display: flex;
  min-height: 100vh;
}

.sidebar {
  width: 240px;
  background: #020617;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.sidebar h2 {
  color: #38bdf8;
}

.sidebar a {
  color: white;
  text-decoration: none;
  padding: 10px;
  border-radius: 8px;
  background: #1e293b;
}

.sidebar a:hover {
  background: #38bdf8;
  color: black;
}

.main-content {
  flex: 1;
  padding: 20px;
}
  .activity-item{
  background:#020826;
  border:1px solid #1ea7ff;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.activity-item small{
  opacity:0.7;
}  

@media(max-width:768px) {

  .app-layout {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    white-space: nowrap;
    gap: 10px;
    padding: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    scrollbar-width: none;
    backround: #07122b;
  }

  .sidebar::-webkit-scrollbar {
    display: none;
}

  .sidebar h2 {
    display: none;
  }

  .sidebar a,
  .sidebar button {
    flex-shrink: 0;
    min-width: max-content;
    margin: 0;
  }
  .summary {
  grid-template-columns: repeat(2, 1fr);
}

.box {
  min-height: 90px;
}

  .main-content {
    padding: 15px;
  }

}
    body {
  font-size: 14px;
}

h1 {
  font-size: 28px;
  line-height: 1.1;
}

h2 {
  font-size: 22px;
}

.card {
  padding: 14px;
  border-radius: 14px;
}

.box {
  padding: 12px;
}

.sidebar {
  margin-bottom: 15px;
}

.main-content {
  padding: 12px;
}
    .badge {
  background: #ef4444;
  color: white;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  margin-left: 6px;
}
    .affiliate-card {
  background: #020617;
  padding: 18px;
  border-radius: 14px;
  margin-bottom: 14px;
  border: 1px solid #1ea7ff;
}

.affiliate-card h3 {
  margin-top: 0;
  color: #38bdf8;
}
  </style>
</head>

<body>

<div class="app-layout">

  <div class="sidebar">

    <h2>Divine Sleep</h2>

    <a href="/business-dashboard.html">
      Dashboard
    </a>

    <a href="/business-leads.html">
  Leads
  <span id="leadBadge" class="badge">0</span>
</a>

    <a href="/business-affiliates.html">Affiliates</a>

    <a href="/business-analytics.html">Analytics</a>

    <a href="#">
      Settings
    </a>

    <button onclick="logout()">
      Logout
    </button>

  </div>

  <div class="main-content">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
  <h1>Business Owner Dashboard</h1>

  <button onclick="logout()">
    Logout
  </button>
</div>

  <div class="card">
    <h2 id="businessName">Business</h2> 

  </div>
    <div class="card quick-actions">
  <h2>Quick Actions</h2>
     <button onclick="refreshDashboard()">
  🔄 Update Dashboard Now
</button>

  <button onclick="window.location.href='/business-leads.html'">
  📋 View Leads
</button>

<button onclick="window.location.href='/business-affiliates.html'">
  👥 View Affiliates
</button>

<button onclick="window.location.href='/business-analytics.html'">
  📊 View Analytics
</button>
</div>

  <div class="card">
    <h2>Lead Summary</h2>
    <div class="summary">

  <div class="box">
    <span>📊 Total</span>
    <strong id="totalLeads">0</strong>
  </div>

  <div class="box">
    <span>🆕 New</span>
    <strong id="newLeads">0</strong>
  </div>

  <div class="box">
    <span>📞 Contacted</span>
    <strong id="contactedLeads">0</strong>
  </div>

  <div class="box">
    <span>📅 Booked</span>
    <strong id="bookedLeads">0</strong>
  </div>

  <div class="box">
    <span>💵 Paid</span>
    <strong id="paidLeads">0</strong>
  </div>

  <div class="box">
    <span>❌ Cancelled</span>
    <strong id="cancelledLeads">0</strong>
  </div>

</div>
    
<div class="card">
  <h2>Live Activity</h2>

  <div id="activityFeed"></div>
</div>
    
  <div class="card">
    <h2>Affiliate Performance</h2>
    <pre id="affiliatePerformance"></pre>
  </div>

  <script>
    function playLeadSound() {
  const audio = new Audio("/notification.mp3");
  audio.play();

    const BASE_URL = "https://dnm-backend-production-218c.up.railway.app";
    let previousLeadCount = 0;
    let recentActivities = JSON.parse(localStorage.getItem("recent_activities") || "[]");

    const loggedUser =
  JSON.parse(localStorage.getItem("logged_in_user") || "null");

const isLoggedIn =
  localStorage.getItem("is_logged_in");

if (!loggedUser || !isLoggedIn || loggedUser.role !== "business_owner") {
      document.body.style.visibility = "visible";
      window.location.href = "/login.html";
    }

    document.body.style.visibility = "visible";

    async function loadBusinessDashboard() {
      console.log("Dashboard loading");
}
     
    function playLeadSound() {
  const audio = new Audio(
    "https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
  );

  audio.play().catch(() => {
    console.log("Sound blocked until user interacts with page.");
  });
}

    function showToast(message) {

  const toast = document.createElement("div");

  toast.innerText = message;

  toast.style.position = "fixed";
  toast.style.top = "20px";
  toast.style.right = "20px";
  toast.style.background = "#1e293b";
  toast.style.color = "white";
  toast.style.padding = "15px 20px";
  toast.style.borderRadius = "12px";
  toast.style.boxShadow = "0 4px 12px rgba(0,0,0,0.3)";
  toast.style.zIndex = "9999";
  toast.style.fontWeight = "bold";
  toast.style.opacity = "0";
  toast.style.transform = "translateY(-20px)";
  toast.style.transition = "all 0.3s ease";

  document.body.appendChild(toast);
     setTimeout(() => {
  toast.style.opacity = "1";
  toast.style.transform = "translateY(0)";
}, 50); 

  setTimeout(() => {
  toast.style.opacity = "0";
  toast.style.transform = "translateY(-20px)";

  setTimeout(() => {
    toast.remove();
  }, 300);
}, 4000);
}

    function addActivity(message) {

  recentActivities.unshift({
    text: message,
    time: new Date().toLocaleTimeString()
  });

  recentActivities = recentActivities.slice(0, 10);
  localStorage.setItem("recent_activities", JSON.stringify(recentActivities)); 

  const feed = document.getElementById("activityFeed");

  feed.innerHTML = recentActivities.map(activity => `
    <div class="activity-item">
      <div>${activity.text}</div>
      <small>${activity.time}</small>
    </div>
  `).join("");
}
    
function testNotification() {
  playLeadSound();
  showToast("🔥 Test notification working!");
  if ("vibrate" in navigator) {
  navigator.vibrate(300);
}
}
    
    loadBusinessDashboard();
renderActivities();

setInterval(() => {
  loadBusinessDashboard();
  renderActivities();
}, 5000);
    
function refreshDashboard() {
  loadBusinessDashboard();
  renderActivities();
  showToast("🔄 Dashboard refreshed");
}
    
function logout() {

  localStorage.removeItem("logged_in_user");
  localStorage.removeItem("affiliate_code");
  localStorage.removeItem("is_logged_in");
  localStorage.removeItem("user_role");

  window.location.href = "/login.html";
} 
  </script>

</body>
</html>
