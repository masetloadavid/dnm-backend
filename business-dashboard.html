<!DOCTYPE html>
<html>
<head>
  <title>Business Owner Dashboard</title>
  <style>
    body {
      visibility: hidden;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 18px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .box {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    pre {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    .lead-card {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>
  <h1>Business Owner Dashboard</h1>

  <div class="card">
    <h2 id="businessName">Business</h2>
    <button onclick="loadBusinessDashboard()">Load Dashboard</button>
  </div>

  <div class="card">
    <h2>Lead Summary</h2>
    <div class="summary">
      <div class="box">Total<br><strong id="totalLeads">0</strong></div>
      <div class="box">New<br><strong id="newLeads">0</strong></div>
      <div class="box">Contacted<br><strong id="contactedLeads">0</strong></div>
      <div class="box">Booked<br><strong id="bookedLeads">0</strong></div>
      <div class="box">Paid<br><strong id="paidLeads">0</strong></div>
      <div class="box">Cancelled<br><strong id="cancelledLeads">0</strong></div>
    </div>
  </div>

  <div class="card">
    <h2>Affiliate Performance</h2>
    <pre id="affiliatePerformance"></pre>
  </div>

  <div class="card">
    <h2>Business Leads</h2>
    <div id="leadsContainer"></div>
  </div>

  <script>
    const BASE_URL = "https://dnm-backend-production-218c.up.railway.app";

    const loggedUser =
      JSON.parse(localStorage.getItem("logged_in_user") || "null");

    if (!loggedUser || loggedUser.role !== "business_owner") {
      document.body.style.visibility = "visible";
      document.body.innerHTML =
        "<h1>Access Denied</h1><p>Please login as business owner.</p>";
      throw new Error("Business owner access required");
    }

    document.body.style.visibility = "visible";

    async function loadBusinessDashboard() {
      const businessId = loggedUser.business_id;

      const [summaryRes, leadsRes, payoutsRes] = await Promise.all([
        fetch(BASE_URL + "/api/admin/lead-summary?business_id=" + businessId),
        fetch(BASE_URL + "/api/admin/leads?business_id=" + businessId),
        fetch(BASE_URL + "/api/admin/payouts?business_id=" + businessId)
      ]);

      const summary = await summaryRes.json();
      const leadsData = await leadsRes.json();
      const payoutsData = await payoutsRes.json();

      if (summary.ok) {
        document.getElementById("totalLeads").innerText = summary.total;
        document.getElementById("newLeads").innerText = summary.new;
        document.getElementById("contactedLeads").innerText = summary.contacted;
        document.getElementById("bookedLeads").innerText = summary.booked;
        document.getElementById("paidLeads").innerText = summary.paid;
        document.getElementById("cancelledLeads").innerText = summary.cancelled;
      }

      document.getElementById("affiliatePerformance").innerText =
        JSON.stringify(payoutsData.affiliates || [], null, 2);

      const leadsContainer = document.getElementById("leadsContainer");

      if (leadsData.ok && leadsData.leads.length > 0) {
        leadsContainer.innerHTML = leadsData.leads.map(lead => `
          <div class="lead-card">
            <p><strong>ID:</strong> ${lead.id}</p>
            <p><strong>Referral Code:</strong> ${lead.referral_code || ""}</p>
            <p><strong>Name:</strong> ${lead.full_name}</p>
            <p><strong>Phone:</strong> ${lead.phone}</p>
            <p><strong>Email:</strong> ${lead.email || ""}</p>
            <p><strong>Notes:</strong> ${lead.notes || ""}</p>
            <p><strong>Status:</strong> ${lead.status}</p>
            <p><strong>Created:</strong> ${lead.created_at}</p>
          </div>
        `).join("");
      } else {
        leadsContainer.innerHTML = "<p>No leads found.</p>";
      }
    }

    document.getElementById("businessName").innerText =
      "Business ID: " + loggedUser.business_id;

    loadBusinessDashboard();
  </script>
</body>
</html>
