  font-size: 14px;
}

h1 {

h2 {
  font-size: 22px;
}

.card {

.box {

}

<body>
  <div class="app-layout">
    <div class="sidebar">
      <h2>Divine Sleep</h2>
      <a href="/business-dashboard.html">Dashboard</a>
      <a href="/business-leads.html">
  Leads
  <span id="leadBadge" class="badge">0</span>
</a>
      <a href="/business-affiliates.html">Affiliates</a>
      <a href="/business-analytics.html">Analytics</a>
      <a href="#">Settings</a>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="main-content">
      <h1>Business Leads CRM</h1>

      <div class="card">
        <h2>Filters</h2>
        <input id="searchInput" placeholder="Search name, phone, email..." oninput="renderLeads()" />

        <select id="statusFilter" onchange="renderLeads()">
          <option value="">All Statuses</option>
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="booked">Booked</option>
          <option value="paid">Paid</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <button onclick="loadLeads()">Refresh</button>
      </div>

      <div class="card">
        <h2>Leads</h2>
        <div id="leadsContainer"></div>
      </div>
    </div>
  </div>

  <script>
    const BASE_URL = "https://dnm-backend-production-218c.up.railway.app";

    const loggedUser =
  JSON.parse(localStorage.getItem("logged_in_user") || "null");

const isLoggedIn =
  localStorage.getItem("is_logged_in");

if (!loggedUser || !isLoggedIn || loggedUser.role !== "business_owner") {
      document.body.style.visibility = "visible";
      window.location.href = "/login.html";
    }

    document.body.style.visibility = "visible";

    let allLeads = [];
    let previousLeadCount = 0;
    let knownLeadIds = [];

    function updateLeadBadge() {
  const newLeads = allLeads.filter(lead => lead.status === "new").length;
  document.getElementById("leadBadge").innerText = newLeads;
}

    async function loadLeads() {
      const businessId = loggedUser.business_id;

      const res = await fetch(
        BASE_URL + "/api/admin/leads?business_id=" + businessId
      );

      const data = await res.json();

      if (data.ok) {
        const latestLeads = data.leads || [];
       latestLeads.sort((a, b) => {

  const priority = {
    new: 1,
    contacted: 2,
    booked: 3,
    paid: 4,
    cancelled: 5
  };

  return priority[a.status] - priority[b.status];

}); 

const newLeads = latestLeads.filter(
  lead => !knownLeadIds.includes(lead.id)
);

allLeads = latestLeads;

if (knownLeadIds.length > 0 && newLeads.length > 0) {
  showToast("🔥 New lead received!");
}

knownLeadIds = latestLeads.map(lead => lead.id);
previousLeadCount = latestLeads.length;

updateLeadBadge();
renderLeads(newLeads);
      }
    }

    function renderLeads(newLeads = []) {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const status = document.getElementById("statusFilter").value;

      let filtered = allLeads.filter(lead => {
        const text = (
          (lead.full_name || "") + " " +
          (lead.phone || "") + " " +
          (lead.email || "") + " " +
          (lead.referral_code || "")
        ).toLowerCase();

        const matchesSearch = text.includes(search);
        const matchesStatus = !status || lead.status === status;

        return matchesSearch && matchesStatus;
      });

      const container = document.getElementById("leadsContainer");

      if (!filtered.length) {
        container.innerHTML = "<p>No leads found.</p>";
        return;
      }

      container.innerHTML = filtered.map(lead => `
        <div class="lead-card ${newLeads.some(n => n.id === lead.id) ? 'new-lead-highlight' : ''}">
          <h3>${lead.full_name || "No name"}</h3>

          <p><strong>Phone:</strong> ${lead.phone || ""}</p>
          <p><strong>Email:</strong> ${lead.email || ""}</p>
          <p><strong>Referral Code:</strong> ${lead.referral_code || ""}</p>
          <p><strong>Notes:</strong> ${lead.notes || ""}</p>
          <p>
  <strong>Status:</strong>

  <span class="status-badge status-${lead.status}">
    ${lead.status}
  </span>
</p>
          <p><strong>Created:</strong> ${lead.created_at}</p>

          <div class="actions">
            <select id="status-${lead.id}">
              <option value="new" ${lead.status === "new" ? "selected" : ""}>new</option>
              <option value="contacted" ${lead.status === "contacted" ? "selected" : ""}>contacted</option>
              <option value="booked" ${lead.status === "booked" ? "selected" : ""}>booked</option>
              <option value="paid" ${lead.status === "paid" ? "selected" : ""}>paid</option>
              <option value="cancelled" ${lead.status === "cancelled" ? "selected" : ""}>cancelled</option>
            </select>

            <button onclick="updateLeadStatus(${lead.id})">Update Status</button>

            <a href="https://wa.me/27${(lead.phone || '').replace(/^0/, '').replace(/\\s/g, '')}" target="_blank">
              <button>WhatsApp Guest</button>
            </a>
          </div>
        </div>
      `).join("");
    }

    function saveActivity(message) {
  let activities = JSON.parse(localStorage.getItem("recent_activities") || "[]");

  activities.unshift({
    text: message,
    time: new Date().toLocaleTimeString()
  });

  activities = activities.slice(0, 10);

  localStorage.setItem("recent_activities", JSON.stringify(activities));
}

    async function updateLeadStatus(leadId) {
      const newStatus = document.getElementById("status-" + leadId).value;

      const res = await fetch(
        BASE_URL + "/api/leads/" + leadId + "/status",
        {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            status: newStatus
          })
        }
      );

      const data = await res.json();

      if (data.ok) {
  saveActivity("✅ Lead status updated to " + newStatus);
  loadLeads();
      } else {
        alert("Failed to update lead status");
      }
    }

    function logout() {
      localStorage.removeItem("logged_in_user");
      localStorage.removeItem("affiliate_code");
      localStorage.removeItem("is_logged_in");
      localStorage.removeItem("user_role");
      window.location.href = "/login.html";
    }

    loadLeads();
  </script>
</body>
