<!DOCTYPE html>
<html>
<head>
  <title>Affiliate Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    input, button {
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }
    pre {
      background: #020617;
      padding: 15px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h1>Affiliate Lead Dashboard</h1>

<div class="card">
  <h2>Enter Affiliate Code</h2>
  <input id="code" placeholder="e.g. AFF001" />
  <button onclick="loadAffiliate()">Load Leads</button>
</div>
  
<div class="card">
  <h2>Total Leads: <span id="totalLeads">0</span></h2>
</div>
  
<div class="card">
  <h2>Booked/Paid Leads: <span id="earningLeads">0</span></h2>
</div>
  
<div class="card">
  <h2>Total Earnings: R <span id="totalEarnings">0</span></h2>
</div>
  
<div class="card">
  <h2>Affiliate Info</h2>
  <pre id="affiliateInfo"></pre>
</div>

<div class="card">
  <h2>Leads</h2>
  <div id="leadsOutput"></div>
</div>

<script>
  const BASE_URL = "https://dnm-backend-production-218c.up.railway.app";

  const params = new URLSearchParams(window.location.search);
  const ref = params.get("code");

  if (ref) {
    document.getElementById("code").value = ref;
    loadAffiliate();
  }

  async function loadAffiliate() {
    const code = document.getElementById("code").value.trim();
    if (!code) {
      alert("Enter affiliate code");
      return;
    }

    const res = await fetch(BASE_URL + "/api/affiliate/" + code + "/leads");
    const data = await res.json();

    document.getElementById("affiliateInfo").innerText =
      JSON.stringify(data.affiliate, null, 2);

    document.getElementById("earningsInfo").innerText =
      JSON.stringify(data.earnings, null, 2);

    renderLeads(data.leads || [], code);
  }

  function renderLeads(leads, code) {
    const container = document.getElementById("leadsOutput");

    if (!leads.length) {
      container.innerHTML = "<p>No leads found.</p>";
      return;
    }

    container.innerHTML = leads.map(lead => `
      <div style="background:#0b1220; padding:15px; border-radius:10px; margin-bottom:15px;">
        <p><strong>ID:</strong> ${lead.id}</p>
        <p><strong>Name:</strong> ${lead.full_name}</p>
        <p><strong>Phone:</strong> ${lead.phone}</p>
        <p><strong>Email:</strong> ${lead.email}</p>
        <p><strong>Notes:</strong> ${lead.notes || ""}</p>
        <p><strong>Status:</strong> <span id="status-${lead.id}">${lead.status}</span></p>
        <p><strong>Created:</strong> ${lead.created_at}</p>

        <div style="margin-top:10px;">
          <select id="lead-status-${lead.id}" style="padding:8px; border-radius:6px;">
            <option value="new" ${lead.status === "new" ? "selected" : ""}>new</option>
            <option value="contacted" ${lead.status === "contacted" ? "selected" : ""}>contacted</option>
            <option value="booked" ${lead.status === "booked" ? "selected" : ""}>booked</option>
            <option value="paid" ${lead.status === "paid" ? "selected" : ""}>paid</option>
            <option value="cancelled" ${lead.status === "cancelled" ? "selected" : ""}>cancelled</option>
          </select>

          <button onclick="updateLeadStatus(${lead.id}, '${code}')" style="margin-left:8px; padding:8px 14px; border:none; border-radius:6px; background:#38bdf8; color:black; font-weight:bold; cursor:pointer;">
            Update Status
          </button>
        </div>
      </div>
    `).join("");
  }

  async function updateLeadStatus(leadId, code) {
    const newStatus = document.getElementById("lead-status-" + leadId).value;

    const res = await fetch(BASE_URL + "/api/leads/" + leadId + "/status", {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ status: newStatus })
    });

    const data = await res.json();

    if (data.ok) {
      document.getElementById("status-" + leadId).innerText = data.lead.status;
      alert("Lead status updated successfully");
      loadAffiliate();
    } else {
      alert("Failed to update lead status");
      console.error(data);
    }
  }
</script>

</body>
</html>
