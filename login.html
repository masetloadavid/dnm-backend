<!DOCTYPE html>
<html>
<head>
  <title>System Login</title>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 30px;
    }
    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 14px;
      max-width: 450px;
      margin: auto;
    }
    input, button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      border: none;
      box-sizing: border-box;
    }
    button {
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    pre {
      background: #020617;
      padding: 15px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>

    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <pre id="output"></pre>
  </div>

  <script>
    const BASE_URL = "https://dnm-backend-production-218c.up.railway.app";

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch(BASE_URL + "/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!data.ok) {
        document.getElementById("output").innerText =
          JSON.stringify(data, null, 2);
        return;
      }

      localStorage.setItem("logged_in_user", JSON.stringify(data.user));
      localStorage.setItem("user_role", data.user.role);

      if (data.affiliate) {
        localStorage.setItem("affiliate_code", data.affiliate.referral_code);
      }

      if (data.user.role === "admin") {
        window.location.href = "/admin-dashboard.html";
      } else if (data.user.role === "affiliate") {
        window.location.href = "/affiliate-dashboard.html";
      } else if (data.user.role === "business_owner") {
        window.location.href = "/business-dashboard.html";
      } else {
        document.getElementById("output").innerText =
          "Unknown role: " + data.user.role;
      }
    }
  </script>
  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js");
  }
</script>
</body>
</html>
